<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .wordmark { font-family: "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif; font-weight: 700; }
    </style>
  </defs>

  <!-- Icon: three stacked plates, bottom = ink, middle = ink-soft, top = marigold -->
  <g transform="translate(130,130)">
    <!-- connector lines (drawn first, so nodes sit on top) -->
    <g stroke="#33456B" stroke-width="3" opacity="0.55">
      <line x1="-108" y1="-6"  x2="-70" y2="-6" />
      <line x1="-108" y1="20"  x2="-64" y2="20" />
      <line x1="108"  y1="-6"  x2="70"  y2="-6" />
      <line x1="108"  y1="20"  x2="64"  y2="20" />
    </g>

    <!-- bottom plate: ink -->
    <polygon points="0,42 92,20 0,-2 -92,20" fill="#1B2A4A" stroke="#FAF8F3" stroke-width="4"/>
    <!-- middle plate: ink-soft -->
    <polygon points="0,16 84,-4 0,-24 -84,-4" fill="#33456B" stroke="#FAF8F3" stroke-width="4"/>
    <!-- top plate: marigold -->
    <polygon points="0,-10 76,-28 0,-46 -76,-28" fill="#C97A0A" stroke="#FAF8F3" stroke-width="4"/>

    <!-- circuit nodes -->
    <g fill="#33456B">
      <circle cx="-108" cy="-6" r="7"/>
      <circle cx="-108" cy="20" r="7"/>
      <circle cx="108" cy="-6" r="7"/>
      <circle cx="108" cy="20" r="7"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="290" y="150" class="wordmark" font-size="88" fill="#1B2A4A">JNTUStack</text>
</svg>
